name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Generate short-lived token from GitHub App
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: CycoAi  # Target organization with packages
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore packages
        run: dotnet restore
        env:
          # Use GitHub App token for authentication
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      
      - name: Build
        run: dotnet build --no-restore --configuration Release
      
      - name: Verify sample compiles
        run: |
          echo "✅ Sample built successfully!"
          echo "📦 Package CycoAi.OAuth2.Client restored from CycoAi org"
          echo "🎉 Cross-organization package access working!"
